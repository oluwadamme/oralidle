name: widget_overlay_outside
description: "Speech Fluency Coach - improve oral English communication skills."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Speech to text (on-device, free)
  speech_to_text: ^7.0.0

  # Charts
  fl_chart: ^0.70.2

  # Navigation
  go_router: ^14.8.1

  # HTTP for Claude API
  http: ^1.2.2

  # Local storage (community edition)
  hive_ce: ^2.9.0
  hive_ce_flutter: ^2.2.0

  # Permissions
  permission_handler: ^11.4.0

  # Env config
  flutter_dotenv: ^5.2.1

  # File picker for audio upload
  file_picker: ^8.1.6

  # Google Fonts (Plus Jakarta Sans, Manrope, Space Grotesk)
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
